name: Release (本地构建上传)

# 发布流程：本地编译 → gh release create 直接上传 dist/ 产物
# 不在 CI 编译，避免 TDLib/签名环境差异导致包不可用

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (e.g. 1.12.1)'
        required: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release placeholder
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: LazyCat v${{ github.event.inputs.version }}
          body: |
            ## LazyCat v${{ github.event.inputs.version }}

            ### 下载

            | 文件 | 说明 |
            |------|------|
            | `.dmg` | 推荐 — 拖拽安装 |
            | `.zip` | 解压即用 |

            ### 安装
            1. 下载 `.dmg`，打开后拖拽 **LazyCat.app** 到 Applications
            2. 首次运行若提示"无法验证开发者"：右键 → 打开

            > 每次更新后需在「系统设置 → 输入监控」重新授权 LazyCat
          draft: false
          prerelease: false
