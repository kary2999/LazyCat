name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.12.0)'
        required: false

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner (M1), macOS 14 Sonoma

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TDLib
        run: |
          brew install tdlib openssl@3

      - name: Read version from Info.plist
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build & package
        run: |
          bash build.sh --dist
        env:
          ARCHS: arm64

      - name: Generate version.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/LazyCat-${VERSION}.dmg"
          cat > dist/version.json <<EOF
          {
            "version": "${VERSION}",
            "download_url": "${DMG_URL}",
            "release_notes": "LazyCat v${VERSION} — 详情见 Release 页面"
          }
          EOF
          cat dist/version.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LazyCat-${{ steps.version.outputs.version }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.tar.gz
            dist/*.sha256.txt
            dist/version.json
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: LazyCat ${{ steps.version.outputs.version }}
          body: |
            ## LazyCat ${{ steps.version.outputs.version }}

            ### 下载

            | 文件 | 说明 |
            |------|------|
            | `.dmg` | 推荐 — 拖拽安装 |
            | `.zip` | 解压即用 |
            | `.tar.gz` | 命令行解压 |
            | `.sha256.txt` | 校验和 |

            ### 安装
            1. 下载 `.dmg`
            2. 打开后把 **LazyCat.app** 拖到 Applications
            3. 首次运行若提示"无法验证开发者"：右键 → 打开

            > **注意**：每次更新后需在「系统设置 → 输入监控」重新授权 LazyCat（ad-hoc 签名每次编译 CDHash 变化）
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.tar.gz
            dist/*.sha256.txt
            dist/version.json
          draft: false
          prerelease: false
